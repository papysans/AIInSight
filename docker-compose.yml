services:
  # FastAPI backend (Python)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - RENDERER_SERVICE_URL=http://renderer:3001
      - XHS_MCP_URL=http://xhs-mcp:18060/mcp
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://localhost:8000}
      - XHS_LOGIN_QRCODE_TIMEOUT_SECONDS=${XHS_LOGIN_QRCODE_TIMEOUT_SECONDS:-60}
      - TZ=${TZ:-Asia/Shanghai}
      - XHS_MCP_SOURCE_TIMEZONE=${XHS_MCP_SOURCE_TIMEZONE:-UTC}
      - XHS_IMAGE_API_DIR=/app/runtime/xhs/images
      - XHS_IMAGE_MCP_DIR=/app/images
    volumes:
      - ./cache:/app/cache
      - ./outputs:/app/outputs
      - ./runtime/xhs/data:/app/runtime/xhs/data
      - ./runtime/xhs/images:/app/runtime/xhs/images
    depends_on:
      - renderer
      - xhs-mcp

  # Playwright card renderer (Express + headless Chromium)
  renderer:
    build:
      context: .
      dockerfile: renderer/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - TZ=${TZ:-Asia/Shanghai}

  # Opinion MCP server exposed to Claude / Claude Code
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "opinion_mcp.server", "--host", "0.0.0.0", "--port", "18061"]
    ports:
      - "18061:18061"
    env_file: .env
    environment:
      - OPINION_BACKEND_URL=http://api:8000
      - XHS_MCP_URL=http://xhs-mcp:18060/mcp
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - api
      - xhs-mcp

  xhs-mcp:
    build:
      context: .
      dockerfile: Dockerfile.xhs-mcp
    container_name: aiinsight-xhs-mcp
    restart: unless-stopped
    init: true
    tty: true
    environment:
      XHS_MCP_HEADLESS: "true"
      XHS_MCP_DATA_DIR: /data
      XHS_MCP_PORT: "18060"
      XHS_MCP_REQUEST_INTERVAL: ${XHS_MCP_REQUEST_INTERVAL:-2000}
      XHS_MCP_LOG_LEVEL: ${XHS_MCP_LOG_LEVEL:-info}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./runtime/xhs/data:/data
      - ./runtime/xhs/images:/app/images
    ports:
      - "${XHS_MCP_PORT:-18060}:18060"
